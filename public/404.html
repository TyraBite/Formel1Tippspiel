<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <script>
    var base = '/Formel1Tippspiel';
    var path = window.location.pathname;
    var route = path.startsWith(base) ? path.slice(base.length) : path;
    sessionStorage.setItem('spa-redirect', route + window.location.search + window.location.hash);
    window.location.replace(window.location.origin + base + '/');
  </script>
</head>
</html>
